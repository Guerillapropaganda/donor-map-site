name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - v4
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Rebuild derived artifacts required by the build
        # Some data files are imported statically by Quartz/ops components but
        # are too large to commit (>100MB GitHub cap) or are regenerable from
        # canonical stores. This manifest rebuilds them from committed inputs.
        # Add new entries to scripts/ci-prebuild.cjs when you introduce a new
        # derived-but-required artifact.
        run: node scripts/ci-prebuild.cjs

      - name: Build Quartz
        run: npx quartz build
        env:
          CONSTRUCTION_MODE: "true"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
