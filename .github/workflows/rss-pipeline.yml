name: RSS Intelligence Pipeline

on:
  schedule:
    # 8am, 2pm, 8pm ET (12:00, 18:00, 00:00 UTC)
    - cron: '0 12 * * *'
    - cron: '0 18 * * *'
    - cron: '0 0 * * *'
  workflow_dispatch: # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  rss-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v4
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run RSS Pipeline
        run: node scripts/rss-pipeline.cjs --write --verbose

      - name: Check for new events
        id: changes
        run: |
          git add -A content/Events/
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No new events found"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "New events detected:"
            git diff --staged --name-only
          fi

      - name: Commit and push new events
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "RSS Pipeline Bot"
          git config user.email "noreply@thedonormap.org"
          EVENT_COUNT=$(git diff --staged --name-only | grep "Events/Drafts/" | wc -l)
          DIGEST_COUNT=$(git diff --staged --name-only | grep "Events/Digests/" | wc -l)
          git commit -m "$(cat <<EOF
          RSS scan: ${EVENT_COUNT} events matched, ${DIGEST_COUNT} digest(s)

          Automated scan by RSS Intelligence Pipeline
          EOF
          )"
          git push origin v4
