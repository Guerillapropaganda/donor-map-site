name: Broken Link Checker

on:
  schedule:
    - cron: '0 6 * * 0'  # Sundays at 6am UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check links and create report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node << 'SCRIPT'
          const fs = require('fs');
          const path = require('path');
          const https = require('https');
          const http = require('http');
          const { execSync } = require('child_process');

          const MAX_URLS = 200;
          const TIMEOUT_MS = 10000;
          const BOT_BLOCKING_DOMAINS = [
            'forbes.com',
            'wsj.com',
            'bloomberg.com',
          ];

          // Collect all .md files under content/
          function collectMdFiles(dir) {
            let results = [];
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                results = results.concat(collectMdFiles(full));
              } else if (entry.isFile() && entry.name.endsWith('.md')) {
                results.push(full);
              }
            }
            return results;
          }

          // Extract URLs from markdown link syntax ](url)
          function extractUrls(filePath) {
            const content = fs.readFileSync(filePath, 'utf8');
            const regex = /\]\((https?:\/\/[^\s)]+)\)/g;
            const urls = [];
            let match;
            while ((match = regex.exec(content)) !== null) {
              urls.push({ url: match[1], file: filePath });
            }
            return urls;
          }

          // Check if a domain is in the bot-blocking list
          function isBotBlocking(url) {
            try {
              const hostname = new URL(url).hostname;
              return BOT_BLOCKING_DOMAINS.some(d => hostname === d || hostname.endsWith('.' + d));
            } catch {
              return false;
            }
          }

          // Check a single URL
          function checkUrl(url) {
            return new Promise((resolve) => {
              const proto = url.startsWith('https') ? https : http;
              const req = proto.get(url, {
                timeout: TIMEOUT_MS,
                headers: {
                  'User-Agent': 'Mozilla/5.0 (compatible; DonorMapLinkChecker/1.0)',
                  'Accept': 'text/html,*/*',
                },
              }, (res) => {
                // Consume response body to free socket
                res.resume();
                // Follow redirects manually to report them
                const status = res.statusCode;
                const location = res.headers.location || null;
                resolve({ status, location, error: null });
              });
              req.on('timeout', () => {
                req.destroy();
                resolve({ status: null, location: null, error: 'timeout' });
              });
              req.on('error', (err) => {
                resolve({ status: null, location: null, error: err.code || err.message });
              });
            });
          }

          async function main() {
            const contentDir = path.join(process.cwd(), 'content');
            if (!fs.existsSync(contentDir)) {
              console.log('No content/ directory found');
              process.exit(0);
            }

            // Collect all URLs
            const mdFiles = collectMdFiles(contentDir);
            let allEntries = [];
            for (const f of mdFiles) {
              allEntries = allEntries.concat(extractUrls(f));
            }

            // Deduplicate by URL, keep first occurrence file reference
            const seen = new Map();
            const unique = [];
            for (const entry of allEntries) {
              if (!seen.has(entry.url)) {
                seen.set(entry.url, [entry.file]);
                unique.push(entry);
              } else {
                seen.get(entry.url).push(entry.file);
              }
            }

            console.log(`Found ${unique.length} unique URLs across ${mdFiles.length} .md files`);

            // Separate bot-blocking URLs
            const unverifiable = [];
            const checkable = [];
            for (const entry of unique) {
              if (isBotBlocking(entry.url)) {
                unverifiable.push(entry);
              } else {
                checkable.push(entry);
              }
            }

            // Limit to MAX_URLS
            const toCheck = checkable.slice(0, MAX_URLS);
            console.log(`Checking ${toCheck.length} URLs (${unverifiable.length} unverifiable, ${checkable.length - toCheck.length} skipped due to limit)`);

            const broken = [];      // 4xx, 5xx
            const redirected = [];  // 3xx
            const errors = [];      // timeout, connection errors

            // Check URLs with concurrency limit
            const CONCURRENCY = 10;
            for (let i = 0; i < toCheck.length; i += CONCURRENCY) {
              const batch = toCheck.slice(i, i + CONCURRENCY);
              const results = await Promise.all(
                batch.map(async (entry) => {
                  const result = await checkUrl(entry.url);
                  return { ...entry, ...result };
                })
              );
              for (const r of results) {
                if (r.error) {
                  errors.push(r);
                } else if (r.status >= 400) {
                  broken.push(r);
                } else if (r.status >= 300 && r.status < 400) {
                  redirected.push(r);
                }
              }
              // Brief pause between batches
              if (i + CONCURRENCY < toCheck.length) {
                await new Promise(r => setTimeout(r, 500));
              }
            }

            console.log(`Results: ${broken.length} broken, ${redirected.length} redirected, ${errors.length} errors`);

            // Only create issue if there are problems
            if (broken.length === 0 && errors.length === 0) {
              console.log('No broken links or errors found. Skipping issue creation.');
              process.exit(0);
            }

            // Build issue body
            const date = new Date().toISOString().split('T')[0];
            const relPath = (f) => path.relative(process.cwd(), f);

            let body = `## Link Check Summary\n\n`;
            body += `| Metric | Count |\n|---|---|\n`;
            body += `| URLs checked | ${toCheck.length} |\n`;
            body += `| Broken (4xx/5xx) | ${broken.length} |\n`;
            body += `| Redirected (3xx) | ${redirected.length} |\n`;
            body += `| Timeout/Connection errors | ${errors.length} |\n`;
            body += `| Unverifiable (bot-blocking) | ${unverifiable.length} |\n`;
            body += `| Skipped (over limit) | ${Math.max(0, checkable.length - MAX_URLS)} |\n\n`;

            if (broken.length > 0) {
              body += `## Broken Links (4xx/5xx)\n\n`;
              // Group by file
              const byFile = {};
              for (const b of broken) {
                const files = seen.get(b.url) || [b.file];
                for (const f of files) {
                  const key = relPath(f);
                  if (!byFile[key]) byFile[key] = [];
                  byFile[key].push(b);
                }
              }
              for (const [file, entries] of Object.entries(byFile)) {
                body += `### \`${file}\`\n`;
                for (const e of entries) {
                  body += `- **${e.status}** — ${e.url}\n`;
                }
                body += `\n`;
              }
            }

            if (errors.length > 0) {
              body += `## Timeout / Connection Errors\n\n`;
              const byFile = {};
              for (const e of errors) {
                const files = seen.get(e.url) || [e.file];
                for (const f of files) {
                  const key = relPath(f);
                  if (!byFile[key]) byFile[key] = [];
                  byFile[key].push(e);
                }
              }
              for (const [file, entries] of Object.entries(byFile)) {
                body += `### \`${file}\`\n`;
                for (const e of entries) {
                  body += `- **${e.error}** — ${e.url}\n`;
                }
                body += `\n`;
              }
            }

            if (redirected.length > 0) {
              body += `<details><summary>Redirected Links (3xx) — ${redirected.length} total</summary>\n\n`;
              for (const r of redirected) {
                body += `- **${r.status}** \`${relPath(r.file)}\` — ${r.url}`;
                if (r.location) body += ` → ${r.location}`;
                body += `\n`;
              }
              body += `\n</details>\n\n`;
            }

            if (unverifiable.length > 0) {
              body += `<details><summary>Unverifiable URLs (bot-blocking sites) — ${unverifiable.length} total</summary>\n\n`;
              body += `These sites block automated requests and could not be checked:\n\n`;
              for (const u of unverifiable) {
                body += `- \`${relPath(u.file)}\` — ${u.url}\n`;
              }
              body += `\n</details>\n\n`;
            }

            body += `---\n*Generated by link-checker workflow on ${date}*\n`;

            // Create issue via gh CLI
            const title = `🔗 Broken Link Report — ${date}`;
            const titleFile = '/tmp/issue-title.txt';
            const bodyFile = '/tmp/issue-body.md';
            fs.writeFileSync(titleFile, title);
            fs.writeFileSync(bodyFile, body);

            try {
              execSync(
                `gh issue create --title "$(cat ${titleFile})" --body-file ${bodyFile} --label "broken-links"`,
                { stdio: 'inherit' }
              );
              console.log('Issue created successfully.');
            } catch (err) {
              // Label might not exist yet — create it and retry
              try {
                execSync(`gh label create "broken-links" --color "d73a4a" --description "Automated broken link reports" 2>/dev/null || true`, { stdio: 'inherit' });
                execSync(
                  `gh issue create --title "$(cat ${titleFile})" --body-file ${bodyFile} --label "broken-links"`,
                  { stdio: 'inherit' }
                );
                console.log('Issue created successfully (after creating label).');
              } catch (retryErr) {
                console.error('Failed to create issue:', retryErr.message);
                process.exit(1);
              }
            }
          }

          main().catch(err => {
            console.error('Fatal error:', err);
            process.exit(1);
          });
          SCRIPT
