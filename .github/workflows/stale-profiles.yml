name: Stale Profile Report

on:
  schedule:
    - cron: '0 7 * * 1' # Mondays at 7am UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  stale-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v4
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Scan profiles and build report
        id: scan
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const NOW = Date.now();
            const DAY_MS = 86400000;
            const STALE_DAYS = 90;
            const STUCK_RAW_DAYS = 30;

            // Parse YAML frontmatter from --- delimited block
            function parseFrontmatter(content) {
              const match = content.match(/^---\r?\n([\s\S]*?)\r?\n---/);
              if (!match) return {};
              const fm = {};
              const lines = match[1].split('\n');
              let currentKey = null;
              let currentArray = [];

              for (const line of lines) {
                const trimmed = line.trim();
                if (!trimmed || trimmed.startsWith('#')) continue;

                // Check if this is a list item under the current key
                if (/^\s+-\s+/.test(line) && currentKey) {
                  const item = trimmed.replace(/^-\s+/, '').replace(/^["']|["']$/g, '');
                  currentArray.push(item);
                  fm[currentKey] = currentArray;
                  continue;
                }

                // Reset current array tracking
                currentKey = null;
                currentArray = [];

                const kvMatch = trimmed.match(/^([a-z][a-z0-9-]*)\s*:\s*(.*)/i);
                if (kvMatch) {
                  const key = kvMatch[1].trim();
                  let val = kvMatch[2].trim();

                  if (val.startsWith('[') && val.endsWith(']')) {
                    // Inline array like [a, b, c]
                    val = val.slice(1, -1).split(',').map(s => s.trim()).filter(Boolean);
                    fm[key] = val;
                  } else if (val === '' || val === '[]') {
                    fm[key] = null;
                    // Might be followed by array items
                    currentKey = key;
                    currentArray = [];
                  } else {
                    fm[key] = val;
                  }
                }
              }
              return fm;
            }

            // Recursively find .md files
            function findMdFiles(dir) {
              const results = [];
              if (!fs.existsSync(dir)) return results;
              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                const fullPath = path.join(dir, entry.name);
                if (entry.isDirectory()) {
                  results.push(...findMdFiles(fullPath));
                } else if (entry.name.endsWith('.md')) {
                  results.push(fullPath);
                }
              }
              return results;
            }

            const scanDirs = ['content/Politicians', 'content/Donors & Power Networks'];
            const allFiles = [];
            for (const dir of scanDirs) {
              allFiles.push(...findMdFiles(dir));
            }

            const staleProfiles = [];
            const missingDate = [];
            const stuckRaw = [];
            const missingTopDonors = [];

            for (const filePath of allFiles) {
              const content = fs.readFileSync(filePath, 'utf8');
              const fm = parseFrontmatter(content);
              const relativePath = filePath.replace(/\\/g, '/');
              const title = fm.title || path.basename(filePath, '.md');

              // Check last-updated
              const lastUpdated = fm['last-updated'];
              if (!lastUpdated) {
                missingDate.push({ title, path: relativePath });
              } else {
                const updatedDate = new Date(lastUpdated);
                if (!isNaN(updatedDate.getTime())) {
                  const ageDays = Math.floor((NOW - updatedDate.getTime()) / DAY_MS);
                  if (ageDays >= STALE_DAYS) {
                    staleProfiles.push({ title, path: relativePath, ageDays, lastUpdated });
                  }
                }
              }

              // Check stuck raw profiles
              const readiness = fm['content-readiness'];
              if (readiness === 'raw') {
                if (lastUpdated) {
                  const updatedDate = new Date(lastUpdated);
                  if (!isNaN(updatedDate.getTime())) {
                    const ageDays = Math.floor((NOW - updatedDate.getTime()) / DAY_MS);
                    if (ageDays >= STUCK_RAW_DAYS) {
                      stuckRaw.push({ title, path: relativePath, ageDays });
                    }
                  }
                } else {
                  stuckRaw.push({ title, path: relativePath, ageDays: null });
                }
              }

              // Check politicians missing top-donors
              if (fm.type === 'politician') {
                const topDonors = fm['top-donors'];
                if (!topDonors || (Array.isArray(topDonors) && topDonors.length === 0)) {
                  missingTopDonors.push({ title, path: relativePath });
                }
              }
            }

            staleProfiles.sort((a, b) => b.ageDays - a.ageDays);

            const totalProblems = staleProfiles.length + missingDate.length
              + stuckRaw.length + missingTopDonors.length;

            if (totalProblems === 0) {
              core.setOutput('has_problems', 'false');
              console.log('All profiles are current. No issues to report.');
              return;
            }

            core.setOutput('has_problems', 'true');

            // Build issue body
            const today = new Date().toISOString().split('T')[0];
            const lines = [];
            lines.push(`## Stale Profile Report \u2014 ${today}`);
            lines.push('');
            lines.push(`Scanned **${allFiles.length}** profiles across Politicians and Donors.`);
            lines.push('');
            lines.push('| Category | Count |');
            lines.push('|---|---|');
            lines.push(`| Stale (90+ days) | ${staleProfiles.length} |`);
            lines.push(`| Missing last-updated | ${missingDate.length} |`);
            lines.push(`| Stuck at raw (30+ days) | ${stuckRaw.length} |`);
            lines.push(`| Politicians missing top-donors | ${missingTopDonors.length} |`);
            lines.push(`| **Total issues** | **${totalProblems}** |`);
            lines.push('');

            if (staleProfiles.length > 0) {
              lines.push('### Most Stale Profiles (oldest first)');
              lines.push('');
              lines.push('| Profile | Last Updated | Days Stale |');
              lines.push('|---|---|---|');
              for (const p of staleProfiles.slice(0, 50)) {
                lines.push(`| ${p.title} | ${p.lastUpdated} | ${p.ageDays} |`);
              }
              if (staleProfiles.length > 50) {
                lines.push('');
                lines.push(`*...and ${staleProfiles.length - 50} more.*`);
              }
              lines.push('');
            }

            if (missingTopDonors.length > 0) {
              lines.push('### Politicians Missing top-donors');
              lines.push('');
              for (const p of missingTopDonors.slice(0, 30)) {
                lines.push(`- ${p.title} \u2014 \`${p.path}\``);
              }
              if (missingTopDonors.length > 30) {
                lines.push('');
                lines.push(`*...and ${missingTopDonors.length - 30} more.*`);
              }
              lines.push('');
            }

            if (stuckRaw.length > 0) {
              lines.push('### Stuck Raw Profiles (30+ days)');
              lines.push('');
              for (const p of stuckRaw) {
                const age = p.ageDays === null ? 'unknown age' : `${p.ageDays} days`;
                lines.push(`- ${p.title} (${age}) \u2014 \`${p.path}\``);
              }
              lines.push('');
            }

            if (missingDate.length > 0) {
              lines.push('### Profiles Missing last-updated');
              lines.push('');
              for (const p of missingDate.slice(0, 30)) {
                lines.push(`- ${p.title} \u2014 \`${p.path}\``);
              }
              if (missingDate.length > 30) {
                lines.push('');
                lines.push(`*...and ${missingDate.length - 30} more.*`);
              }
              lines.push('');
            }

            lines.push('---');
            lines.push('*Generated by Stale Profile Report workflow.*');

            // Write report to temp file to avoid output escaping issues
            const issueTitle = `\ud83d\udcca Stale Profile Report \u2014 ${today}`;
            const issueBody = lines.join('\n');
            fs.writeFileSync('/tmp/issue-title.txt', issueTitle);
            fs.writeFileSync('/tmp/issue-body.txt', issueBody);
            console.log(`Report: ${totalProblems} problems across ${allFiles.length} profiles.`);

      - name: Close previous stale-profiles issues
        if: steps.scan.outputs.has_problems == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'stale-profiles',
              state: 'open',
            });
            for (const issue of issues.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'not_planned',
              });
              console.log(`Closed previous issue #${issue.number}`);
            }

      - name: Create stale-profiles label if needed
        if: steps.scan.outputs.has_problems == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'stale-profiles',
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'stale-profiles',
                  color: 'f59e0b',
                  description: 'Weekly stale profile audit report',
                });
              }
            }

      - name: Create new issue
        if: steps.scan.outputs.has_problems == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const title = fs.readFileSync('/tmp/issue-title.txt', 'utf8');
            const body = fs.readFileSync('/tmp/issue-body.txt', 'utf8');
            const result = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['stale-profiles'],
            });
            console.log(`Created issue #${result.data.number}: ${title}`);
