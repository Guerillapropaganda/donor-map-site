name: Regression Tests + Data Integrity

# Runs the Phase 6 regression test suite and data integrity audit on
# every PR to v4 and every push to v4. These are the same gates the
# pre-commit hook runs locally — CI runs them server-side in case the
# hook was bypassed (SKIP_HOOKS=1) or never installed.
#
# Docs:
# - content/Decisions/0008-query-engine-build-complete.md
# - content/Phases/phase-6/retrospective.md
# - scripts/phase-6-regression-tests.cjs (20 tests, ~75ms)
# - scripts/phase-6-data-integrity-audit.cjs

on:
  pull_request:
    branches:
      - v4
  push:
    branches:
      - v4
  workflow_dispatch:

jobs:
  regression-tests:
    name: Phase 6 Regression Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Run regression tests
        run: node --test scripts/phase-6-regression-tests.cjs

      - name: Run query engine contract tests
        run: node --test scripts/query-engine-contract-tests.cjs

      - name: Run auth architecture smoke tests
        run: node --test scripts/auth-smoke-tests.cjs

  data-integrity-audit:
    name: Data Integrity Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Run data integrity audit
        run: node scripts/phase-6-data-integrity-audit.cjs

  publication-readiness-smoke:
    name: Publication Readiness Script Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      # This job does NOT fail on unpublishable profiles — it only fails
      # if the script itself crashes. "0 profiles ready" is expected
      # until David works through the verified-promotion batch.
      - name: Smoke test publication-readiness-check
        run: |
          node scripts/publication-readiness-check.cjs --folder Policies || exit_code=$?
          # Exit 1 from the script means "found unpublishable profiles" (expected).
          # Exit 2 means "script crashed" (real failure).
          if [ "${exit_code:-0}" = "2" ]; then
            echo "publication-readiness-check.cjs crashed"
            exit 1
          fi
          echo "publication-readiness-check.cjs ran cleanly"

  deps-cve-scan:
    name: Dependencies CVE Scan
    runs-on: ubuntu-latest
    # Fails the PR if critical or high severity vulnerabilities are found
    # in either root or ops/ dependencies.
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm ci

      - name: Install ops dependencies
        working-directory: ops
        run: npm ci

      - name: Run CVE scan
        run: node scripts/security/deps-cve-scan.cjs --ci

  ops-build:
    name: Ops Next.js Build
    runs-on: ubuntu-latest
    # Catches the 2026-04-15 Clerk incident class: package.json lists a
    # dep but node_modules is stale OR deps have a broken import chain.
    # Runs `npm ci` (strict lockfile install) + `next build` (full
    # production compile) — either step fails if deps are broken.
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Cache ops dependencies
        uses: actions/cache@v5
        with:
          path: ops/node_modules
          key: ${{ runner.os }}-ops-node-${{ hashFiles('ops/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-ops-node-

      - name: Install ops dependencies (strict lockfile)
        working-directory: ops
        run: npm ci

      # Note: deps-sync-check is NOT run here — it expects BOTH root/
      # and ops/ node_modules to exist, but this job intentionally only
      # installs ops/. The equivalent validation comes from `npm ci`
      # above (strict lockfile match) + the webpack compile step below
      # (import resolution). For full-repo drift detection, the local
      # .husky/post-merge hook and pre-commit sentinel #8 are the
      # authoritative layers.

      # This job validates that ops/ can RESOLVE all its imports and
      # COMPILE cleanly via webpack — the 2026-04-15 Clerk incident
      # class. It does NOT enforce TypeScript strictness — that's a
      # separate concern (the ops/ codebase has pre-existing D3 type
      # inference issues in money-trail/page.tsx that are unrelated
      # to deps drift). A dedicated TS-strict CI job can be added
      # later when those pre-existing errors are cleaned up.
      #
      # OPS_CI_BUILD=1 tells ops/next.config.js to set
      # typescript.ignoreBuildErrors + eslint.ignoreDuringBuilds.
      # In local dev (OPS_CI_BUILD unset), strictness is normal.
      - name: Build Ops app (webpack compile, skip TS strictness)
        working-directory: ops
        env:
          CI: true
          OPS_CI_BUILD: "1"
        run: npx next build
