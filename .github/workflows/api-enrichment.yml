name: API Enrichment Pipeline

on:
  schedule:
    # Aggressive schedule until backlog cleared — then switch to weekly
    - cron: '0 8 * * *'   # 8am UTC (4am ET)
    - cron: '0 14 * * *'  # 2pm UTC (10am ET)
    - cron: '0 20 * * *'  # 8pm UTC (4pm ET)
    - cron: '0 2 * * *'   # 2am UTC (10pm ET)
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max profiles to enrich per run'
        default: '15'
      pipeline:
        description: 'Which pipeline (fec, congress, propublica, sam, lda, usaspending, govtrack, all)'
        default: 'all'

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v4
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Create .env from secrets
        run: |
          echo "FEC_API_KEY=${{ secrets.FECAPI }}" >> .env
          echo "CONGRESS_API_KEY=${{ secrets.CONGRESSAPI }}" >> .env
          echo "LDA_API_KEY=${{ secrets.LDAAPI }}" >> .env
          echo "SAM_API_KEY=${{ secrets.SAMAPI }}" >> .env

      - name: Run FEC Enrichment
        if: ${{ github.event.inputs.pipeline == 'fec' || github.event.inputs.pipeline == 'all' || github.event.inputs.pipeline == '' }}
        timeout-minutes: 8
        run: |
          node scripts/fec-pipeline.cjs --write --limit=${{ github.event.inputs.limit || '15' }} 2>&1 || true

      - name: Run Congress Enrichment
        if: ${{ github.event.inputs.pipeline == 'congress' || github.event.inputs.pipeline == 'all' || github.event.inputs.pipeline == '' }}
        timeout-minutes: 8
        run: |
          node scripts/congress-pipeline.cjs --write --limit=${{ github.event.inputs.limit || '15' }} 2>&1 || true

      - name: Run ProPublica 990 Enrichment
        if: ${{ github.event.inputs.pipeline == 'propublica' || github.event.inputs.pipeline == 'all' || github.event.inputs.pipeline == '' }}
        timeout-minutes: 5
        run: |
          node scripts/propublica-pipeline.cjs --write --limit=${{ github.event.inputs.limit || '15' }} 2>&1 || true

      - name: Run GovTrack Enrichment
        if: ${{ github.event.inputs.pipeline == 'govtrack' || github.event.inputs.pipeline == 'all' || github.event.inputs.pipeline == '' }}
        timeout-minutes: 5
        run: |
          node scripts/govtrack-pipeline.cjs --write --limit=${{ github.event.inputs.limit || '15' }} 2>&1 || true

      - name: Run SAM.gov Contract Enrichment
        if: ${{ github.event.inputs.pipeline == 'sam' || github.event.inputs.pipeline == 'all' || github.event.inputs.pipeline == '' }}
        timeout-minutes: 5
        run: |
          node scripts/sam-pipeline.cjs --write --limit=${{ github.event.inputs.limit || '10' }} 2>&1 || true

      - name: Run USASpending Enrichment
        if: ${{ github.event.inputs.pipeline == 'usaspending' || github.event.inputs.pipeline == 'all' || github.event.inputs.pipeline == '' }}
        timeout-minutes: 5
        run: |
          node scripts/usaspending-pipeline.cjs --write --limit=${{ github.event.inputs.limit || '10' }} 2>&1 || true

      - name: Run LDA Lobbying Enrichment
        if: ${{ github.event.inputs.pipeline == 'lda' || github.event.inputs.pipeline == 'all' || github.event.inputs.pipeline == '' }}
        timeout-minutes: 5
        run: |
          node scripts/lda-pipeline.cjs --write --limit=${{ github.event.inputs.limit || '10' }} 2>&1 || true

      - name: Check for changes
        id: changes
        run: |
          git add -A content/
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No profiles updated"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            CHANGED=$(git diff --staged --name-only | wc -l)
            echo "updated_count=$CHANGED" >> $GITHUB_OUTPUT
            echo "$CHANGED files updated:"
            git diff --staged --name-only | head -20
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "API Enrichment Bot"
          git config user.email "noreply@thedonormap.org"
          UPDATED=${{ steps.changes.outputs.updated_count }}
          git commit -m "API enrichment: ${UPDATED} profiles updated

          Automated by API Enrichment Pipeline"
          git push origin v4
