name: API Enrichment Pipeline

on:
  schedule:
    - cron: '0 8 * * *'   # 8am UTC (4am ET)
    - cron: '0 14 * * *'  # 2pm UTC (10am ET)
    - cron: '0 20 * * *'  # 8pm UTC (4pm ET)
    - cron: '0 2 * * *'   # 2am UTC (10pm ET)
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max profiles to enrich per run (FEC/Congress/ProPublica)'
        default: '30'
      pipeline:
        description: 'Which pipeline (fec, fec-summary, congress, committee, propublica, nonprofit-990, sam, lda, usaspending, usaspending-awards, govtrack, lobbyview, fara, courtlistener, federal-register, sec-edgar, sec-litigation, public-accountability, fcc, opensanctions, doj-press, wikipedia, ofac-sdn, recall, nhtsa-recalls, lobbying-contrib, voting-record, all)'
        default: 'all'
      profile:
        description: 'Target a specific profile by name (e.g. "Cori Bush"). Leave empty for batch mode.'
        default: ''

permissions:
  contents: read

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      CONTENT_DIR: ./site/content
    steps:
      - name: Checkout engine (this repo)
        uses: actions/checkout@v4

      - name: Checkout public site repo
        uses: actions/checkout@v4
        with:
          repository: Guerillapropaganda/donor-map-site
          ref: v4
          token: ${{ secrets.SITEPUSHTOKEN }}
          path: site
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Restore pipeline caches
        uses: actions/cache@v4
        with:
          path: reports
          key: pipeline-caches-${{ github.run_id }}
          restore-keys: |
            pipeline-caches-

      - name: Create .env from secrets
        run: |
          echo "FEC_API_KEY=${{ secrets.FECAPI }}" >> .env
          echo "CONGRESS_API_KEY=${{ secrets.CONGRESSAPI }}" >> .env
          echo "LDA_API_KEY=${{ secrets.LDAAPI }}" >> .env
          echo "SAM_API_KEY=${{ secrets.SAMAPI }}" >> .env
          echo "LOBBYVIEW_API_KEY=${{ secrets.LOBBYVIEWAPI }}" >> .env
          echo "COURTLISTENER_API_KEY=${{ secrets.COURTLISTENERAPI }}" >> .env
          echo "OPENSANCTIONS_API_KEY=${{ secrets.OPENSANCTIONSAPI }}" >> .env
          echo "DOL_API_KEY=${{ secrets.DOLAPI }}" >> .env

      - name: Run all pipelines in parallel
        timeout-minutes: 25
        continue-on-error: true
        run: |
          mkdir -p reports/logs
          LIMIT_FAST=${{ github.event.inputs.limit || '30' }}
          PIPELINE="${{ github.event.inputs.pipeline || 'all' }}"
          PROFILE="${{ github.event.inputs.profile || '' }}"
          run_if() {
            local name=$1
            shift
            if [ "$PIPELINE" = "all" ] || [ "$PIPELINE" = "$name" ] || [ -z "$PIPELINE" ]; then
              if [ -n "$PROFILE" ]; then
                "$@" --profile="$PROFILE" > "reports/logs/$name.log" 2>&1 &
              else
                "$@" > "reports/logs/$name.log" 2>&1 &
              fi
              echo "   launched $name (pid $!)"
            fi
          }

          echo "Launching enrichment pipelines in parallel..."
          run_if fec         node scripts/fec-pipeline.cjs         --write --limit=$LIMIT_FAST
          run_if congress    node scripts/congress-pipeline.cjs    --write --limit=$LIMIT_FAST
          run_if propublica  node scripts/propublica-pipeline.cjs  --write --limit=$LIMIT_FAST
          run_if govtrack    node scripts/govtrack-pipeline.cjs    --write --limit=5
          run_if sam         node scripts/sam-pipeline.cjs         --write --limit=10
          run_if usaspending node scripts/usaspending-pipeline.cjs --write --limit=10
          run_if lda         node scripts/lda-pipeline.cjs         --write --limit=20
          run_if lobbyview   node scripts/lobbyview-pipeline.cjs   --write --limit=5
          run_if fara           node scripts/fara-pipeline.cjs           --write --limit=15
          run_if courtlistener  node scripts/courtlistener-pipeline.cjs --write --limit=15
          run_if federal-register node scripts/federal-register-pipeline.cjs --write --limit=20
          run_if sec-edgar        node scripts/sec-edgar-pipeline.cjs        --write --limit=15
          run_if public-accountability node scripts/public-accountability-pipeline.cjs --write --limit=15
          run_if fcc              node scripts/fcc-political-pipeline.cjs    --write --limit=15
          run_if opensanctions    node scripts/opensanctions-pipeline.cjs   --write --limit=50
          run_if stock-watcher    node scripts/stock-watcher-pipeline.cjs   --write
          run_if gleif            node scripts/gleif-pipeline.cjs            --write --limit=30
          run_if epa-echo         node scripts/epa-echo-pipeline.cjs         --write --limit=15
          run_if osha             node scripts/osha-pipeline.cjs             --write --limit=15
          run_if fec-summary      node scripts/fec-summary-pipeline.cjs      --write --limit=20
          run_if nonprofit-990    node scripts/nonprofit-990-pipeline.cjs    --write --limit=20
          run_if sec-litigation   node scripts/sec-litigation-pipeline.cjs   --write --limit=15
          run_if doj-press       node scripts/doj-press-pipeline.cjs        --write --limit=15
          run_if wikipedia       node scripts/wikipedia-pipeline.cjs        --write --limit=30
          run_if committee       node scripts/committee-pipeline.cjs        --write --limit=20
          run_if ofac-sdn        node scripts/ofac-sdn-pipeline.cjs         --write
          run_if recall          node scripts/recall-pipeline.cjs           --write --limit=15
          run_if usaspending-awards node scripts/usaspending-awards-pipeline.cjs --write --limit=15
          run_if nhtsa-recalls   node scripts/nhtsa-recalls-pipeline.cjs    --write --limit=15
          run_if executive-orders node scripts/executive-orders-pipeline.cjs --write
          run_if lobbying-contrib node scripts/lobbying-contrib-pipeline.cjs --write
          run_if voting-record node scripts/voting-record-pipeline.cjs --write --limit=$LIMIT_FAST

          echo "Waiting for all pipelines to finish..."
          wait
          echo "All pipelines done."

          # Auto-connection engine  runs after all pipelines to map relationships
          echo "Running auto-connection engine..."
          node scripts/auto-connection-engine.cjs --write --verbose

          for log in reports/logs/*.log; do
            echo ""
            echo ""
            echo "  $(basename $log .log | tr '[:lower:]' '[:upper:]')"
            echo ""
            tail -40 "$log"
          done

      - name: Check for changes
        id: changes
        working-directory: ./site
        run: |
          echo "=== Git status before add ==="
          git status --short content/ | head -30
          git add -A content/
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No profiles updated"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            CHANGED=$(git diff --staged --name-only | wc -l)
            echo "updated_count=$CHANGED" >> $GITHUB_OUTPUT
            echo "$CHANGED files updated:"
            git diff --staged --name-only | head -20
          fi

      - name: Build commit message
        if: steps.changes.outputs.has_changes == 'true'
        id: commit_msg
        run: |
          # Parse per-pipeline counts from log files
          SUMMARY_PARTS=()
          for log in reports/logs/*.log; do
            name=$(basename "$log" .log)
            count=$(grep -c "Written to vault" "$log" 2>/dev/null || echo 0)
            if [ "$count" -gt 0 ]; then
              SUMMARY_PARTS+=("$name:$count")
            fi
          done

          IFS=' '
          SHORT_SUMMARY="${SUMMARY_PARTS[*]}"
          UPDATED=${{ steps.changes.outputs.updated_count }}
          CONFLICTS=$(grep -rh "parked (human edit detected)" reports/logs/ 2>/dev/null | wc -l || echo 0)

          echo "subject=API enrichment: $UPDATED files ($SHORT_SUMMARY)" >> $GITHUB_OUTPUT

          # Write body to a temp file to avoid heredoc corruption on timeout
          BODY_FILE=$(mktemp)
          {
            echo "Automated run by donor-map-engine."
            echo ""
            echo "Per-pipeline write counts:"
            for part in "${SUMMARY_PARTS[@]}"; do
              echo "  - $part profiles"
            done
            if [ "$CONFLICTS" -gt 0 ]; then
              echo ""
              echo "  $CONFLICTS parked-merge blocks  human edits detected."
            fi
            echo ""
            echo "Updated files:"
            cd site && git diff --staged --name-only | head -50
            TOTAL=$(git diff --staged --name-only | wc -l)
            if [ "$TOTAL" -gt 50 ]; then
              echo "  ... and $((TOTAL - 50)) more"
            fi
          } > "$BODY_FILE"
          echo "body_file=$BODY_FILE" >> $GITHUB_OUTPUT

      - name: Commit and push to public site
        if: steps.changes.outputs.has_changes == 'true'
        working-directory: ./site
        env:
          SUBJECT: ${{ steps.commit_msg.outputs.subject }}
          BODY_FILE: ${{ steps.commit_msg.outputs.body_file }}
        run: |
          git config user.name "API Enrichment Bot"
          git config user.email "noreply@thedonormap.org"
          BODY=""
          if [ -f "$BODY_FILE" ]; then
            BODY=$(cat "$BODY_FILE")
          fi
          git commit -m "$SUBJECT" -m "$BODY"
          # Merge latest v4 in case manual commits landed during the run
          # Use -X theirs so additive frontmatter changes don't conflict
          git fetch origin v4
          git pull --no-rebase -X theirs --no-edit origin v4
          git push origin v4
