<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Donor Map — Interactive Network Graph</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f;
  color: #e2e8f0;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

#graph-container {
  width: 100%;
  height: 100%;
  position: relative;
}

canvas {
  display: block;
}

/* Header overlay */
#header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  padding: 16px 24px;
  background: linear-gradient(180deg, rgba(10,10,15,0.95) 0%, rgba(10,10,15,0) 100%);
  z-index: 100;
  pointer-events: none;
}

#header > * { pointer-events: auto; }

#header h1 {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: #f8fafc;
  margin-bottom: 4px;
}

#header .subtitle {
  font-size: 12px;
  color: #94a3b8;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

/* Controls */
#controls {
  position: fixed;
  top: 80px;
  left: 24px;
  z-index: 100;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.control-group {
  background: rgba(15,23,42,0.9);
  border: 1px solid rgba(148,163,184,0.15);
  border-radius: 8px;
  padding: 12px;
  backdrop-filter: blur(12px);
}

.control-group label {
  display: block;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #64748b;
  margin-bottom: 8px;
}

.filter-btn {
  display: inline-block;
  padding: 4px 10px;
  margin: 2px;
  border-radius: 4px;
  border: 1px solid rgba(148,163,184,0.2);
  background: rgba(30,41,59,0.5);
  color: #94a3b8;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.2s;
}

.filter-btn:hover { border-color: rgba(148,163,184,0.4); color: #e2e8f0; }
.filter-btn.active { border-color: var(--btn-color, #f59e0b); color: #f8fafc; background: rgba(245,158,11,0.15); }

.filter-btn[data-type="politician"] { --btn-color: #6b7280; }
.filter-btn[data-type="politician"].active { background: rgba(107,114,128,0.2); border-color: #6b7280; }
.filter-btn[data-type="donor"] { --btn-color: #f59e0b; }
.filter-btn[data-type="donor"].active { background: rgba(245,158,11,0.15); border-color: #f59e0b; }
.filter-btn[data-type="media"] { --btn-color: #a855f7; }
.filter-btn[data-type="media"].active { background: rgba(168,85,247,0.15); border-color: #a855f7; }
.filter-btn[data-type="think_tank"] { --btn-color: #10b981; }
.filter-btn[data-type="think_tank"].active { background: rgba(16,185,129,0.15); border-color: #10b981; }
.filter-btn[data-type="dem"] { --btn-color: #2563eb; }
.filter-btn[data-type="dem"].active { background: rgba(37,99,235,0.15); border-color: #2563eb; }
.filter-btn[data-type="rep"] { --btn-color: #dc2626; }
.filter-btn[data-type="rep"].active { background: rgba(220,38,38,0.15); border-color: #dc2626; }

/* Search */
#search-box {
  background: rgba(30,41,59,0.8);
  border: 1px solid rgba(148,163,184,0.2);
  border-radius: 6px;
  padding: 8px 12px;
  color: #e2e8f0;
  font-size: 13px;
  width: 220px;
  outline: none;
}
#search-box:focus { border-color: #f59e0b; }
#search-box::placeholder { color: #475569; }

/* Tooltip */
#tooltip {
  position: fixed;
  display: none;
  background: rgba(15,23,42,0.95);
  border: 1px solid rgba(148,163,184,0.2);
  border-radius: 8px;
  padding: 12px 16px;
  z-index: 200;
  pointer-events: none;
  backdrop-filter: blur(12px);
  max-width: 320px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

#tooltip .tt-name {
  font-size: 14px;
  font-weight: 600;
  color: #f8fafc;
  margin-bottom: 4px;
}

#tooltip .tt-type {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 6px;
}

#tooltip .tt-connections {
  font-size: 12px;
  color: #94a3b8;
}

#tooltip .tt-connections strong {
  color: #f59e0b;
}

/* Stats bar */
#stats {
  position: fixed;
  bottom: 16px;
  left: 24px;
  font-size: 11px;
  color: #475569;
  z-index: 100;
  display: flex;
  gap: 16px;
}

#stats span { display: flex; align-items: center; gap: 4px; }
#stats .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

/* Legend */
#legend {
  position: fixed;
  bottom: 16px;
  right: 24px;
  background: rgba(15,23,42,0.9);
  border: 1px solid rgba(148,163,184,0.15);
  border-radius: 8px;
  padding: 12px 16px;
  z-index: 100;
  backdrop-filter: blur(12px);
}

#legend h3 {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #64748b;
  margin-bottom: 8px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: #94a3b8;
  margin-bottom: 4px;
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Loading */
#loading {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 14px;
  color: #64748b;
  z-index: 300;
}
</style>
</head>

// Category map
const CAT_MAP = {p:'politician',d:'donor',m:'media',t:'think_tank',l:'lobbying',s:'story',o:'other'};
const CAT_LABELS = {p:'Politician',d:'Donor / PAC',m:'Media',t:'Think Tank',l:'Lobbying Firm',s:'Story',o:'Index'};

// Parse data
const nodes = RAW_DATA.nodes.map(n => ({
  id: n.id,
  title: n.t,
  category: n.c,
  color: n.clr,
  radius: n.r,
  connections: n.cn,
  party: n.p || null,
  subcategory: n.sc || null,
  mediaCategory: n.mc || null,
  x: 0, y: 0,
  vx: 0, vy: 0,
  fx: null, fy: null,
}));

const nodeMap = new Map(nodes.map(n => [n.id, n]));

const links = RAW_DATA.links.filter(l => nodeMap.has(l.s) && nodeMap.has(l.t)).map(l => ({
  source: nodeMap.get(l.s),
  target: nodeMap.get(l.t),
}));

// Build adjacency
const adjacency = new Map();
for (const n of nodes) adjacency.set(n.id, new Set());
for (const l of links) {
  adjacency.get(l.source.id).add(l.target.id);
  adjacency.get(l.target.id).add(l.source.id);
}

// Canvas setup
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, dpr;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// Initialize positions in a circle
const cx = W / 2, cy = H / 2;
nodes.forEach((n, i) => {
  const angle = (i / nodes.length) * Math.PI * 2;
  const r = 200 + Math.random() * 300;
  n.x = cx + Math.cos(angle) * r;
  n.y = cy + Math.sin(angle) * r;
});

// Force simulation (manual for canvas performance)
const ALPHA_DECAY = 0.0015;
const VELOCITY_DECAY = 0.4;
let alpha = 1;
let simRunning = true;

function forceTick() {
  if (alpha < 0.001) { simRunning = false; return; }
  alpha *= (1 - ALPHA_DECAY);
  
  // Center gravity
  const strength = 0.01 * alpha;
  for (const n of nodes) {
    n.vx += (cx - n.x) * strength;
    n.vy += (cy - n.y) * strength;
  }
  
  // Repulsion (Barnes-Hut approximation - simplified)
  const repStr = -300 * alpha;
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      let dx = nodes[j].x - nodes[i].x;
      let dy = nodes[j].y - nodes[i].y;
      let d2 = dx * dx + dy * dy;
      if (d2 < 1) d2 = 1;
      let d = Math.sqrt(d2);
      let f = repStr / d2;
      let fx = dx / d * f;
      let fy = dy / d * f;
      nodes[i].vx -= fx;
      nodes[i].vy -= fy;
      nodes[j].vx += fx;
      nodes[j].vy += fy;
    }
  }
  
  // Link attraction
  const linkStr = 0.005 * alpha;
  for (const l of links) {
    let dx = l.target.x - l.source.x;
    let dy = l.target.y - l.source.y;
    let d = Math.sqrt(dx * dx + dy * dy) || 1;
    let f = (d - 100) * linkStr;
    let fx = dx / d * f;
    let fy = dy / d * f;
    l.source.vx += fx;
    l.source.vy += fy;
    l.target.vx -= fx;
    l.target.vy -= fy;
  }
  
  // Apply velocity
  for (const n of nodes) {
    if (n.fx !== null) { n.x = n.fx; n.vx = 0; }
    else { n.vx *= VELOCITY_DECAY; n.x += n.vx; }
    if (n.fy !== null) { n.y = n.fy; n.vy = 0; }
    else { n.vy *= VELOCITY_DECAY; n.y += n.vy; }
  }
}

// Camera
let camX = 0, camY = 0, camZoom = 1;

function screenToWorld(sx, sy) {
  return {
    x: (sx - W/2) / camZoom + cx + camX,
    y: (sy - H/2) / camZoom + cy + camY,
  };
}

function worldToScreen(wx, wy) {
  return {
    x: (wx - cx - camX) * camZoom + W/2,
    y: (wy - cy - camY) * camZoom + H/2,
  };
}

// Filters
let activeCategories = new Set(['d','p','m','t','l','s','o']);
let activeParties = new Set(['D','R','I', null]);
let searchTerm = '';
let hoveredNode = null;
let selectedNode = null;
let dragNode = null;

function isVisible(n) {
  if (!activeCategories.has(n.category)) return false;
  if (n.category === 'p' && n.party && !activeParties.has(n.party)) return false;
  if (searchTerm && !n.title.toLowerCase().includes(searchTerm)) return false;
  return true;
}

function getHighlightedSet() {
  const target = selectedNode || hoveredNode;
  if (!target) return null;
  const set = new Set([target.id]);
  const adj = adjacency.get(target.id);
  if (adj) adj.forEach(id => set.add(id));
  return set;
}

// Render
function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  
  // Apply camera transform
  ctx.translate(W/2, H/2);
  ctx.scale(camZoom, camZoom);
  ctx.translate(-cx - camX, -cy - camY);
  
  const highlighted = getHighlightedSet();
  const dimMode = !!highlighted;
  
  // Draw links
  ctx.lineWidth = 0.3 / camZoom;
  for (const l of links) {
    const sv = isVisible(l.source);
    const tv = isVisible(l.target);
    if (!sv || !tv) continue;
    
    let opacity = 0.08;
    if (dimMode) {
      if (highlighted.has(l.source.id) && highlighted.has(l.target.id)) {
        opacity = 0.5;
        ctx.lineWidth = 1 / camZoom;
      } else {
        opacity = 0.02;
        ctx.lineWidth = 0.3 / camZoom;
      }
    }
    
    ctx.strokeStyle = `rgba(148,163,184,${opacity})`;
    ctx.beginPath();
    ctx.moveTo(l.source.x, l.source.y);
    ctx.lineTo(l.target.x, l.target.y);
    ctx.stroke();
  }
  
  // Draw nodes
  for (const n of nodes) {
    if (!isVisible(n)) continue;
    
    let nodeAlpha = 1;
    let r = n.radius;
    
    if (dimMode) {
      if (highlighted.has(n.id)) {
        nodeAlpha = 1;
        if (n === (selectedNode || hoveredNode)) r *= 1.3;
      } else {
        nodeAlpha = 0.08;
      }
    }
    
    if (searchTerm && n.title.toLowerCase().includes(searchTerm)) {
      nodeAlpha = 1;
      r *= 1.2;
    }
    
    ctx.globalAlpha = nodeAlpha;
    ctx.fillStyle = n.color;
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    ctx.fill();
    
    // Label for large or highlighted nodes
    const showLabel = r * camZoom > 8 || (dimMode && highlighted.has(n.id));
    if (showLabel && camZoom > 0.3) {
      ctx.fillStyle = '#f8fafc';
      ctx.font = `${Math.max(9, 11 / camZoom)}px Inter, sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(n.title, n.x, n.y - r - 4 / camZoom);
    }
    
    ctx.globalAlpha = 1;
  }
  
  ctx.restore();
}

// Animation loop
function animate() {
  if (simRunning) forceTick();
  draw();
  requestAnimationFrame(animate);
}

// Interaction
let isDragging = false;
let isPanning = false;
let lastMouse = {x: 0, y: 0};

function findNodeAt(sx, sy) {
  const w = screenToWorld(sx, sy);
  let closest = null;
  let minD = Infinity;
  for (const n of nodes) {
    if (!isVisible(n)) continue;
    const dx = n.x - w.x;
    const dy = n.y - w.y;
    const d = Math.sqrt(dx*dx + dy*dy);
    const hitRadius = n.radius + 5 / camZoom;
    if (d < hitRadius && d < minD) {
      minD = d;
      closest = n;
    }
  }
  return closest;
}

canvas.addEventListener('mousedown', (e) => {
  lastMouse = {x: e.clientX, y: e.clientY};
  const node = findNodeAt(e.clientX, e.clientY);
  if (node) {
    dragNode = node;
    isDragging = true;
    node.fx = node.x;
    node.fy = node.y;
    alpha = 0.3;
    simRunning = true;
  } else {
    isPanning = true;
  }
});

canvas.addEventListener('mousemove', (e) => {
  if (isDragging && dragNode) {
    const w = screenToWorld(e.clientX, e.clientY);
    dragNode.fx = w.x;
    dragNode.fy = w.y;
    dragNode.x = w.x;
    dragNode.y = w.y;
  } else if (isPanning) {
    const dx = (e.clientX - lastMouse.x) / camZoom;
    const dy = (e.clientY - lastMouse.y) / camZoom;
    camX -= dx;
    camY -= dy;
    lastMouse = {x: e.clientX, y: e.clientY};
  } else {
    // Hover detection
    const node = findNodeAt(e.clientX, e.clientY);
    hoveredNode = node;
    canvas.style.cursor = node ? 'pointer' : 'grab';
    
    const tooltip = document.getElementById('tooltip');
    if (node) {
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 16) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
      tooltip.querySelector('.tt-name').textContent = node.title;
      
      const catLabel = CAT_LABELS[node.category] || 'Node';
      const partyLabel = node.party ? ` (${node.party})` : '';
      const subLabel = node.subcategory ? ` — ${node.subcategory}` : '';
      tooltip.querySelector('.tt-type').textContent = catLabel + partyLabel + subLabel;
      tooltip.querySelector('.tt-type').style.color = node.color;
      
      const adj = adjacency.get(node.id);
      const adjNodes = adj ? [...adj].map(id => nodeMap.get(id)).filter(Boolean) : [];
      const donorCount = adjNodes.filter(n => n.category === 'd').length;
      const polCount = adjNodes.filter(n => n.category === 'p').length;
      const mediaCount = adjNodes.filter(n => n.category === 'm').length;
      
      let connText = `<strong>${node.connections}</strong> total connections`;
      if (donorCount) connText += ` · <strong>${donorCount}</strong> donors`;
      if (polCount) connText += ` · <strong>${polCount}</strong> politicians`;
      if (mediaCount) connText += ` · <strong>${mediaCount}</strong> media`;
      tooltip.querySelector('.tt-connections').innerHTML = connText;
    } else {
      tooltip.style.display = 'none';
    }
  }
});

canvas.addEventListener('mouseup', () => {
  if (isDragging && dragNode) {
    dragNode.fx = null;
    dragNode.fy = null;
  }
  isDragging = false;
  isPanning = false;
  dragNode = null;
});

canvas.addEventListener('click', (e) => {
  if (isDragging) return;
  const node = findNodeAt(e.clientX, e.clientY);
  if (node) {
    selectedNode = selectedNode === node ? null : node;
  } else {
    selectedNode = null;
  }
});

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.92 : 1.08;
  camZoom = Math.max(0.1, Math.min(5, camZoom * factor));
}, {passive: false});

// Filter buttons
document.querySelectorAll('.filter-btn[data-filter="category"]').forEach(btn => {
  btn.addEventListener('click', () => {
    btn.classList.toggle('active');
    const val = btn.dataset.value;
    if (btn.classList.contains('active')) activeCategories.add(val);
    else activeCategories.delete(val);
  });
});

document.querySelectorAll('.filter-btn[data-filter="party"]').forEach(btn => {
  btn.addEventListener('click', () => {
    btn.classList.toggle('active');
    const val = btn.dataset.value;
    if (btn.classList.contains('active')) activeParties.add(val);
    else activeParties.delete(val);
  });
});

// Search
document.getElementById('search-box').addEventListener('input', (e) => {
  searchTerm = e.target.value.toLowerCase().trim();
  if (searchTerm.length > 1) {
    const found = nodes.find(n => n.title.toLowerCase().includes(searchTerm));
    if (found) {
      hoveredNode = found;
      selectedNode = found;
      // Pan to node
      camX = found.x - cx;
      camY = found.y - cy;
    }
  } else {
    searchTerm = '';
    selectedNode = null;
    hoveredNode = null;
  }
});

// Zoom buttons
document.getElementById('btn-zoom-in').addEventListener('click', () => {
  camZoom = Math.min(5, camZoom * 1.3);
});
document.getElementById('btn-zoom-out').addEventListener('click', () => {
  camZoom = Math.max(0.1, camZoom * 0.7);
});
document.getElementById('btn-reset').addEventListener('click', () => {
  camX = 0; camY = 0; camZoom = 1;
  selectedNode = null; hoveredNode = null;
  searchTerm = '';
  document.getElementById('search-box').value = '';
});

// Start
document.getElementById('loading').style.display = 'none';
animate();
</script>
</body>
</html>
